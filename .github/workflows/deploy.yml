name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Root app (the original ClusterApplet) -> dist/
      - run: npm install
      - run: npm run build

      # BPS applet (KAlgebra Applet Suite, testbed copy) -> dist/bps/
      - name: Build BPS applet
        working-directory: bps
        run: npm install && npm run build
      - name: Assemble /bps/ into the Pages output
        run: mkdir -p dist/bps && cp -r bps/dist/. dist/bps/

      # Skein applet (KAlgebra Applet Suite, testbed copy) -> dist/skein/
      - name: Build Skein applet
        working-directory: skein
        run: npm install && npm run build
      - name: Assemble /skein/ into the Pages output
        run: mkdir -p dist/skein && cp -r skein/dist/. dist/skein/

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
